name: notify-nuxt-website
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 4.x
      - 3.x
    paths:
      - "docs/**"

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-slim
    if: ${{ github.repository_owner == 'nuxt' }}
    steps:
      - name: trigger nuxt website deployment
        run: curl -fsS --max-time 30 --retry 3 --retry-delay 5 --retry-connrefused "${{ secrets.NUXT_WEBSITE_WEBHOOK_URL }}"
