packages:
  - docs
  - packages/**
  - '!packages/nuxi'
  - '!packages/test-utils'
  - '!packages/nuxt/test/package-fixture/pkg'
  - playground
  - test/fixtures/*
  - test/fixtures/*/_local-modules/*

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  oxc-resolver: false
  unrs-resolver: false

patchedDependencies:
  changelogen: patches/changelogen.patch

publicHoistPattern:
  - '*-loader'
  - 'webpack-*'

shellEmulator: true

verifyDepsBeforeRun: install

ignoreWorkspaceCycles: true

overrides:
  "@nuxt/kit": "workspace:*"
  "@nuxt/schema": "workspace:*"
  esbuild: "0.28.1"
  nuxt: "workspace:*"
  vite: "8.0.16"
  vue: "3.5.38"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@nuxt/*'
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
  - vue-bundle-renderer
  # Renovate security update: undici@8.5.0
  - undici@8.5.0
