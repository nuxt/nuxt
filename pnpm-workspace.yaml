packages:
  - docs
  - packages/**
  - '!packages/nuxi'
  - '!packages/test-utils'
  - '!packages/nuxt/test/package-fixture/pkg'
  - playground
  - test/fixtures/*
  - test/fixtures/*/_local-modules/*

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  oxc-resolver: false
  unrs-resolver: false

patchedDependencies:
  changelogen: patches/changelogen.patch

publicHoistPattern:
  - '*-loader'
  - 'webpack-*'

shellEmulator: true

verifyDepsBeforeRun: install

ignoreWorkspaceCycles: true

overrides:
  "@nuxt/kit": "workspace:*"
  "@nuxt/schema": "workspace:*"
  nuxt: "workspace:*"
  vue: "3.5.34"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@nuxt/*'
