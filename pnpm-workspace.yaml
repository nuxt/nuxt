packages:
  - docs
  - packages/**
  - '!packages/nuxi'
  - '!packages/test-utils'
  - '!packages/nuxt/test/package-fixture/pkg'
  - playground
  - test/fixtures/*

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  oxc-resolver: false
  unrs-resolver: false

overrides:
  '@nuxt/kit': workspace:*
  '@nuxt/nitro-server': workspace:*
  '@nuxt/rspack-builder': workspace:*
  '@nuxt/schema': workspace:*
  '@nuxt/vite-builder': workspace:*
  '@nuxt/webpack-builder': workspace:*
  '@vue/compiler-core': 3.5.39
  '@vue/compiler-dom': 3.5.39
  '@vue/shared': 3.5.39
  nuxt: workspace:*
  send: '>=1.2.1'
  vite: '^7.3.6'
  vue: 3.5.39
  typescript: 5.9.3
  webpack: ^5.108.1

patchedDependencies:
  changelogen: patches/changelogen.patch

publicHoistPattern:
  - '*-loader'
  - 'webpack-*'

shellEmulator: true

ignoreWorkspaceCycles: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@nuxt/*'
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
