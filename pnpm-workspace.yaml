packages:
  - docs
  - packages/**
  - '!packages/nuxi'
  - '!packages/test-utils'
  - '!packages/nuxt/test/package-fixture/pkg'
  - playground
  - test/fixtures/*

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - oxc-resolver
  - unrs-resolver

patchedDependencies:
  changelogen: patches/changelogen.patch
  cookie-es@3.0.1: patches/cookie-es@3.0.1.patch

publicHoistPattern:
  - '*-loader'
  - 'webpack-*'

shellEmulator: true

verifyDepsBeforeRun: install
